<!DOCTYPE html>
<html>
<head>

<title>ConnectHub Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.stats{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    width:250px;
}

.card h2{
    color:#667eea;
}

.search-box{
    margin-bottom:20px;
}

input{
    padding:10px;
    width:250px;
}

button{
    padding:10px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

th{
    background:#667eea;
    color:white;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
}

</style>

</head>
<body>

<h1>ConnectHub Dashboard</h1>

<div class="stats">

    <div class="card">

        <h2 id="totalContacts">0</h2>

        <p>Total Contacts</p>

    </div>

</div>

<div class="search-box">

<input
        type="text"
        id="searchBox"
        placeholder="Search by Name">

<button onclick="searchContacts()">

Search

</button>

<button onclick="loadContacts()">

Refresh

</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Message</th>
<th>Submitted At</th>
<th>Action</th>

</tr>

</thead>

<tbody id="contactTable">

</tbody>

</table>

<script>

async function loadContacts(){

    const response =
        await fetch("/contacts");

    const contacts =
        await response.json();

    document.getElementById(
        "totalContacts"
    ).innerText =
        contacts.length;

    displayContacts(contacts);
}

function displayContacts(contacts){

    const table =
        document.getElementById(
            "contactTable"
        );

    table.innerHTML="";

    contacts.forEach(contact=>{

        table.innerHTML += `

        <tr>

        <td>${contact.id}</td>

        <td>${contact.name}</td>

        <td>${contact.email}</td>

        <td>${contact.message}</td>

        <td>${contact.submittedAt}</td>

        <td>

        <button
        class="delete-btn"
        onclick="deleteContact(${contact.id})">

        Delete

        </button>

        </td>

        </tr>
        `;
    });
}

async function deleteContact(id){

    await fetch(
        "/contacts/" + id,
        {
            method:"DELETE"
        });

    loadContacts();
}

async function searchContacts(){

    const name =
        document.getElementById(
            "searchBox"
        ).value;

    const response =
        await fetch(
            "/search?name=" + name
        );

    const contacts =
        await response.json();

    displayContacts(contacts);
}

loadContacts();

</script>

</body>
</html>
