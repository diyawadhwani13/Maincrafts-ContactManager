<!DOCTYPE html>
<html>
<head>
    <title>ConnectHub</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:450px;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(12px);
            box-shadow:0 8px 32px rgba(0,0,0,.25);
            color:white;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            margin-bottom:25px;
            opacity:.9;
        }

        input,textarea{
            width:100%;
            padding:12px;
            margin-top:12px;
            border:none;
            border-radius:10px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:white;
            color:#764ba2;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            transform:translateY(-2px);
        }

    </style>
</head>
<body>

<div class="container">

    <h1>ConnectHub</h1>

    <p>Professional Contact Management System</p>

    <form id="contactForm">

        <input
                type="text"
                id="name"
                placeholder="Your Name"
                required>

        <input
                type="email"
                id="email"
                placeholder="Your Email"
                required>

        <textarea
                id="message"
                rows="5"
                placeholder="Your Message"
                required></textarea>

        <button type="submit">
            Submit Message
        </button>

    </form>

</div>

<script>

document.getElementById("contactForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const contact = {

        name:
            document.getElementById("name").value,

        email:
            document.getElementById("email").value,

        message:
            document.getElementById("message").value
    };

    const response = await fetch(
        "/contact",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(contact)
        });

    if(response.ok){

        Swal.fire({
            icon:'success',
            title:'Success!',
            text:'Message Submitted Successfully'
        });

        document
            .getElementById("contactForm")
            .reset();
    }
});

</script>

</body>
</html>
